<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tammy Padal — Tech News Drafts</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=Anton&display=swap');

  :root{
    --bg: #0a0f0d;
    --panel: #0f1613;
    --panel-2: #131c18;
    --line: #1e2b25;
    --trace: #4ade80;
    --trace-dim: #2f6b48;
    --copper: #c9885a;
    --text: #e8ede9;
    --text-dim: #8fa89a;
    --amber: #e0b04a;
    --gray: #5a6b63;
    --danger: #e0685a;
  }
  *{ box-sizing: border-box; }
  body{
    margin:0;
    background:
      radial-gradient(circle at 15% 0%, rgba(74,222,128,0.06), transparent 40%),
      var(--bg);
    color: var(--text);
    font-family: 'Sora', sans-serif;
    padding-bottom: 60px;
  }
  ::selection{ background: var(--trace-dim); color: #fff; }

  header{
    padding: 28px 20px 20px;
    border-bottom: 1px solid var(--line);
    position: relative;
    overflow: hidden;
  }
  header::before{
    content:'';
    position:absolute; inset:0;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 26px 26px;
    opacity: 0.25;
    mask-image: linear-gradient(to bottom, black, transparent);
  }
  .header-inner{ position: relative; max-width: 720px; margin: 0 auto; }
  .eyebrow{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--trace);
    text-transform: uppercase;
    display:flex; align-items:center; gap:8px;
  }
  .eyebrow::before{
    content:''; width:6px; height:6px; border-radius:50%;
    background: var(--trace); box-shadow: 0 0 8px var(--trace);
  }
  h1{
    font-size: 26px; font-weight: 800; margin: 10px 0 4px;
    letter-spacing: -0.01em;
  }
  .sub{ color: var(--text-dim); font-size: 14px; margin: 0; }

  main{ max-width: 720px; margin: 0 auto; padding: 20px; }

  .controls{
    display:flex; gap:10px; align-items:center; flex-wrap: wrap;
    margin-bottom: 18px;
  }
  button{
    font-family: 'Sora', sans-serif;
    border: none; cursor: pointer; border-radius: 10px;
    font-weight: 600; font-size: 14px;
    transition: transform 0.1s ease, opacity 0.15s ease;
  }
  button:active{ transform: scale(0.97); }
  .btn-primary{
    background: var(--trace); color: #05130a;
    padding: 12px 18px;
    display:flex; align-items:center; gap:8px;
  }
  .btn-primary:disabled{ opacity: 0.5; cursor: default; }
  .btn-ghost{
    background: transparent; color: var(--text-dim);
    border: 1px solid var(--line); padding: 11px 14px;
  }
  .btn-ghost.active{ color: var(--trace); border-color: var(--trace-dim); }

  .tabs{ display:flex; gap: 8px; margin-left: auto; }

  .status-line{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px; color: var(--text-dim);
    margin-bottom: 16px; min-height: 16px;
  }
  .status-line.error{ color: var(--danger); }

  .card{
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 16px;
    position: relative;
    display: flex;
    gap: 14px;
  }
  .pin{
    width: 3px; border-radius: 3px; flex-shrink: 0;
    background: var(--trace-dim);
  }
  .card[data-status="draft"] .pin{ background: var(--amber); }
  .card[data-status="approved"] .pin{ background: var(--trace); box-shadow: 0 0 10px var(--trace); }
  .card[data-status="posted"] .pin{ background: var(--gray); }

  .card-body{ flex: 1; min-width: 0; }
  .card-top{
    display:flex; justify-content: space-between; align-items: flex-start;
    gap: 10px; margin-bottom: 8px;
  }
  .tag-row{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .cat{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px; letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--copper); border: 1px solid var(--copper);
    padding: 2px 7px; border-radius: 5px;
  }
  .status-pill{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 2px 7px; border-radius: 5px; color: var(--text-dim);
  }
  .card[data-status="draft"] .status-pill{ color: var(--amber); }
  .card[data-status="approved"] .status-pill{ color: var(--trace); }
  .card[data-status="posted"] .status-pill{ color: var(--gray); }

  .dupe-badge{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px; letter-spacing: 0.04em;
    color: var(--danger); border: 1px solid var(--danger);
    padding: 2px 7px; border-radius: 5px;
  }

  .headline{ font-size: 16px; font-weight: 700; margin: 0 0 4px; line-height: 1.35; }
  .source-line{ font-size: 12px; color: var(--text-dim); margin: 0 0 12px; }
  .source-line a{ color: var(--text-dim); }

  textarea{
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Sora', sans-serif;
    font-size: 14px;
    line-height: 1.55;
    padding: 12px;
    resize: vertical;
    min-height: 100px;
  }
  textarea:focus{ outline: none; border-color: var(--trace-dim); }

  .card-actions{
    display:flex; gap: 8px; margin-top: 12px; flex-wrap: wrap;
  }
  .mini-btn{
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--line);
    padding: 8px 12px; border-radius: 8px; font-size: 12.5px;
  }
  .mini-btn.copy.copied{ color: var(--trace); border-color: var(--trace-dim); }
  .mini-btn.approve{ color: var(--trace); }
  .mini-btn.posted{ color: var(--gray); }
  .mini-btn.delete{ color: var(--danger); margin-left: auto; }

  .empty{
    text-align: center; padding: 60px 20px; color: var(--text-dim);
  }
  .empty .glyph{ font-size: 28px; margin-bottom: 10px; opacity: 0.7; }
  .empty p{ font-size: 13px; max-width: 320px; margin: 6px auto 0; }

  .spinner{
    width: 14px; height: 14px; border-radius: 50%;
    border: 2px solid rgba(5,19,10,0.3); border-top-color: #05130a;
    animation: spin 0.7s linear infinite;
  }
  .spinner.spinner-dark{
    border: 2px solid rgba(232,237,233,0.25); border-top-color: var(--text);
  }
  @keyframes spin{ to{ transform: rotate(360deg); } }

  .prompt-box{
    margin-top: 10px;
    padding: 12px;
    background: var(--panel-2);
    border: 1px dashed var(--trace-dim);
    border-radius: 10px;
  }
  .prompt-output{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12.5px;
    color: var(--text-dim);
    background: transparent;
    border: 1px solid var(--line);
    margin: 6px 0 10px;
  }
  .mini-btn.copy-prompt.copied{ color: var(--trace); border-color: var(--trace-dim); }

  .sources-panel{
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 16px 18px;
    margin-bottom: 18px;
  }
  .sources-head{
    display:flex; align-items:center; justify-content: space-between;
    cursor: pointer;
  }
  .sources-title{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11.5px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text-dim);
  }
  .sources-count{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; color: var(--trace);
  }
  .chevron{ color: var(--text-dim); font-size: 12px; transition: transform 0.15s ease; }
  .sources-panel.collapsed .chevron{ transform: rotate(-90deg); }
  .sources-body{ margin-top: 14px; }
  .sources-panel.collapsed .sources-body{ display: none; }
  .source-list{ display:flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
  .source-chip{
    display:flex; align-items:center; gap: 7px;
    background: var(--panel-2); border: 1px solid var(--line);
    border-radius: 20px; padding: 6px 6px 6px 12px;
    font-size: 12.5px; color: var(--text);
  }
  .source-chip button{
    background: transparent; color: var(--text-dim);
    border: none; width: 18px; height: 18px; border-radius: 50%;
    display:flex; align-items:center; justify-content:center;
    font-size: 13px; line-height: 1; padding: 0;
  }
  .source-chip button:hover{ color: var(--danger); }
  .source-add{ display:flex; gap: 8px; }
  .source-add input{
    flex: 1;
    background: var(--panel-2); border: 1px solid var(--line);
    border-radius: 8px; color: var(--text);
    font-family: 'Sora', sans-serif; font-size: 13.5px;
    padding: 10px 12px;
  }
  .source-add input:focus{ outline: none; border-color: var(--trace-dim); }
  .source-add button{
    background: var(--trace-dim); color: #eafff2;
    padding: 10px 14px; border-radius: 8px; font-size: 13px;
  }
  .source-hint{ font-size: 11.5px; color: var(--text-dim); margin: 10px 0 0; }
  .handle-bar{ display:flex; align-items:center; gap:10px; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 16px; margin-bottom:12px; flex-wrap:wrap; }
  .handle-bar label{ font-size:13px; color:var(--text-dim); white-space:nowrap; }
  .handle-input-wrap{ display:flex; align-items:center; background:var(--bg); border:1px solid var(--border); border-radius:7px; padding:0 10px; gap:2px; }
  .handle-at{ font-family:'IBM Plex Mono',monospace; font-size:14px; color:var(--trace); }
  .handle-input-wrap input{ background:transparent; border:none; outline:none; font-family:'IBM Plex Mono',monospace; font-size:14px; color:var(--text); width:160px; padding:7px 2px; }
  .btn-save-handle{ background:var(--trace); color:#0a0f0d; border:none; border-radius:7px; padding:7px 16px; font-size:13px; font-weight:700; cursor:pointer; }
  .btn-save-handle:hover{ opacity:0.85; }
  .handle-saved{ font-size:12px; color:var(--trace); opacity:0; transition:opacity 0.3s; }
  .handle-saved.show{ opacity:1; }
  .history-session{ margin-bottom:28px; }
  .history-session-head{ font-size:12px; color:var(--text-dim); font-family:"IBM Plex Mono",monospace; padding:6px 0; border-bottom:1px solid var(--border); margin-bottom:14px; display:flex; justify-content:space-between; align-items:center; }
  .history-clear-btn{ font-size:11px; color:var(--danger); background:none; border:none; cursor:pointer; padding:2px 6px; }
  .history-empty{ text-align:center; color:var(--text-dim); padding:60px 20px; font-size:14px; }

  .graphic-block{
    margin-top: 14px;
    border-top: 1px dashed var(--line);
    padding-top: 14px;
  }
  .graphic-label{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 10px; display:block;
  }
  .graphic-canvas-wrap{
    width: 100%; max-width: 320px;
    border-radius: 10px; overflow: hidden;
    border: 1px solid var(--line);
    background: var(--panel-2);
    margin-bottom: 10px;
  }
  .graphic-canvas-wrap canvas{ width: 100%; height: auto; display: block; }
  .graphic-empty{
    aspect-ratio: 4/5; display:flex; align-items:center; justify-content:center;
    color: var(--text-dim); font-size: 12px; text-align:center; padding: 20px;
  }
  .graphic-controls{ display:flex; gap: 8px; flex-wrap: wrap; }
  .file-btn{
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--line); padding: 8px 12px;
    border-radius: 8px; font-size: 12.5px; cursor: pointer;
    display: inline-block;
  }
  .file-btn input{ display: none; }
  .mini-btn.download{ color: var(--copper); }

  @media (max-width: 480px){
    h1{ font-size: 22px; }
    .card{ padding: 14px; }
    .tabs{ margin-left: 0; }
    .controls{ flex-direction: column; align-items: stretch; }
    .tabs{ display:grid; grid-template-columns: repeat(4,1fr); }
    #scanModeToggle{ display:grid; grid-template-columns: repeat(2,1fr); }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="eyebrow">Draft queue · not auto-posted</div>
    <h1>Tammy Padal — Tech News Drafts</h1>
    <p class="sub">Pulls fresh PC hardware/component news and writes ready-to-edit Facebook captions. You review, edit, and post manually.</p>
  </div>
</header>

<main>
  <div class="handle-bar">
    <label for="handleInput">🏷️ Page handle:</label>
    <div class="handle-input-wrap">
      <span class="handle-at">@</span>
      <input type="text" id="handleInput" placeholder="tammypadal" maxlength="40" spellcheck="false">
    </div>
    <button class="btn-save-handle" id="saveHandleBtn">Save</button>
    <span class="handle-saved" id="handleSaved">✓ Saved</span>
  </div>

  <div class="sources-panel" id="sourcesPanel">
    <div class="sources-head" id="sourcesHead">
      <span class="sources-title">Trusted sources <span class="sources-count" id="sourcesCount"></span></span>
      <span class="chevron">▾</span>
    </div>
    <div class="sources-body">
      <div class="source-list" id="sourceList"></div>
      <div class="source-add">
        <input type="text" id="sourceInput" placeholder="Add a site (e.g. yugatech.com or Rock Paper Shotgun)">
        <button id="sourceAddBtn">Add</button>
      </div>
      <p class="source-hint">Drafts will only pull from sites in this list. Remove all to search broadly again.</p>
    </div>
  </div>

  <div class="controls">
    <div class="tabs" id="scanModeToggle" style="margin-left:0;">
      <button class="btn-ghost active" data-mode="today" title="Quick daily check — one combined search">Today</button>
      <button class="btn-ghost" data-mode="month" title="Thorough sweep — searches each source separately for the whole month, takes longer">This Month</button>
    </div>
    <button class="btn-primary" id="genBtn">
      <span id="genLabel">⚡ Generate drafts</span>
    </button>
    <button class="btn-ghost" id="syncBtn" title="Push all current drafts to the connected Google Sheet">
      <span id="syncLabel">📤 Sync to Sheet</span>
    </button>
    <div class="tabs" id="tabs">
      <button class="btn-ghost active" data-filter="all">All</button>
      <button class="btn-ghost" data-filter="draft">Draft</button>
      <button class="btn-ghost" data-filter="approved">Approved</button>
      <button class="btn-ghost" data-filter="posted">Posted</button>
      <button class="btn-ghost" data-filter="history">🕒 History</button>
    </div>
  </div>
  <div class="status-line" id="statusLine"></div>
  <div id="feed"></div>
</main>

<script>
let PAGE_NAME = "tpknows";

document.getElementById('saveHandleBtn').addEventListener('click', async () => {
  const val = document.getElementById('handleInput').value.trim().replace(/^@+/, '');
  if(!val) return;
  PAGE_NAME = val;
  await saveSettings();
  const saved = document.getElementById('handleSaved');
  saved.classList.add('show');
  setTimeout(() => saved.classList.remove('show'), 2000);
});
let drafts = [];
let currentFilter = 'all';
let sources = [];
let history_sessions = []; // [{date, label, drafts:[]}]

const DEFAULT_SOURCES = [
  "Tom's Hardware", "Videocardz", "TechPowerUp", "Wccftech", "Notebookcheck", "YugaTech"
];

const sourceList = document.getElementById('sourceList');
const sourceInput = document.getElementById('sourceInput');
const sourceAddBtn = document.getElementById('sourceAddBtn');
const sourcesCount = document.getElementById('sourcesCount');
const sourcesHead = document.getElementById('sourcesHead');
const sourcesPanel = document.getElementById('sourcesPanel');


const feed = document.getElementById('feed');
const genBtn = document.getElementById('genBtn');
const genLabel = document.getElementById('genLabel');
const syncBtn = document.getElementById('syncBtn');
const syncLabel = document.getElementById('syncLabel');
const statusLine = document.getElementById('statusLine');
const tabs = document.getElementById('tabs');
const scanModeToggle = document.getElementById('scanModeToggle');

// 'today' = quick, one combined search (fast, for daily checks)
// 'month' = thorough sweep — one search PER source across the whole month
let scanMode = 'today';
scanModeToggle.addEventListener('click', (e) => {
  const btn = e.target.closest('button[data-mode]');
  if(!btn) return;
  scanMode = btn.dataset.mode;
  [...scanModeToggle.children].forEach(b => b.classList.toggle('active', b === btn));
});

function setStatus(msg, isError=false){
  statusLine.textContent = msg || '';
  statusLine.classList.toggle('error', !!isError);
}

async function loadAllFromSheet(){
  try{
    const res = await fetch(`${SHEETS_SYNC_URL}?action=loadAll`);
    const data = await res.json();
    if(!data.ok) throw new Error(data.error || 'Load failed');
    drafts = data.drafts || [];
    history_sessions = data.history || [];
    sources = (data.settings && data.settings.sources && data.settings.sources.length)
      ? data.settings.sources : [...DEFAULT_SOURCES];
    PAGE_NAME = (data.settings && data.settings.pageHandle) || PAGE_NAME;
    const inp = document.getElementById('handleInput');
    if(inp) inp.value = PAGE_NAME;
  }catch(err){
    console.error('Load from Sheet failed:', err);
    setStatus(`Could not load your data from Google Sheet: ${err.message || 'unknown error'}. Working with an empty set for now — avoid generating new drafts until this is fixed, or you may lose track of older ones.`, true);
    drafts = [];
    history_sessions = [];
    sources = [...DEFAULT_SOURCES];
  }
}

async function saveSettings(){
  try{
    const res = await fetch(SHEETS_SYNC_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'saveSettings', pageHandle: PAGE_NAME, sources })
    });
    const data = await res.json();
    if(!data.ok) throw new Error(data.error || 'Save failed');
  }catch(e){
    console.error('saveSettings failed:', e);
    setStatus(`Could not save settings to Google Sheet: ${e.message || 'unknown error'}`, true);
  }
}
// Alias so existing add/remove-source callers (which call saveSources())
// don't need to change.
async function saveSources(){ await saveSettings(); }

function renderSources(){
  sourcesCount.textContent = `(${sources.length})`;
  if(sources.length === 0){
    sourceList.innerHTML = `<span style="color:var(--text-dim);font-size:12.5px;">No sources set — searches broadly.</span>`;
    return;
  }
  sourceList.innerHTML = sources.map((s, i) => `
    <span class="source-chip">${escapeHtml(s)}<button data-idx="${i}" title="Remove">&times;</button></span>
  `).join('');
}

sourceList.addEventListener('click', async (e) => {
  const btn = e.target.closest('button[data-idx]');
  if(!btn) return;
  const idx = parseInt(btn.dataset.idx, 10);
  sources.splice(idx, 1);
  await saveSources();
  renderSources();
});

function addSource(){
  const val = sourceInput.value.trim();
  if(!val) return;
  if(sources.some(s => s.toLowerCase() === val.toLowerCase())){
    sourceInput.value = '';
    return;
  }
  sources.push(val);
  sourceInput.value = '';
  saveSources();
  renderSources();
}
sourceAddBtn.addEventListener('click', addSource);
sourceInput.addEventListener('keydown', (e) => { if(e.key === 'Enter'){ e.preventDefault(); addSource(); } });

sourcesHead.addEventListener('click', () => sourcesPanel.classList.toggle('collapsed'));


async function saveDrafts(immediate = false){
  if(immediate){
    clearTimeout(sheetSyncTimer);
    await syncToSheet(false);
  } else {
    scheduleSheetSync();
  }
}

// ── Google Sheets sync ─────────────────────────────────────────
// Web App deployed from the Apps Script bound to the "TECH FETCHER"
// Google Sheet. Pushes the full current drafts array on every change
// (debounced) so the Sheet always mirrors the app — including the
// Approved tag/checkbox, which flips based on each draft's status.
const SHEETS_SYNC_URL = "https://script.google.com/macros/s/AKfycby4zeSmnov2X0xggPf2SvxGxovSR29WMKs0phK4ciWVyTS2jl3Ls87kDKQF054jrrHD9Q/exec";

let sheetSyncTimer = null;
const SHEET_SYNC_DEBOUNCE_MS = 3000;

// Called after every saveDrafts() — e.g. a keystroke in a caption
// textarea. Debounced so rapid edits collapse into one sync a few
// seconds after the user stops typing, instead of one request per
// keystroke.
function scheduleSheetSync(){
  if(!SHEETS_SYNC_URL) return;
  clearTimeout(sheetSyncTimer);
  sheetSyncTimer = setTimeout(() => { syncToSheet(false); }, SHEET_SYNC_DEBOUNCE_MS);
}

async function syncToSheet(manual){
  if(!SHEETS_SYNC_URL){
    if(manual) setStatus('No Google Sheet connected yet.', true);
    return;
  }
  if(manual){
    syncBtn.disabled = true;
    syncLabel.innerHTML = '<span class="spinner spinner-dark"></span> Syncing…';
  }
  try{
    // text/plain avoids a CORS preflight (OPTIONS) request, which Apps
    // Script web apps don't handle — the server still reads it as JSON.
    const res = await fetch(SHEETS_SYNC_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'sync', drafts })
    });
    const data = await res.json();
    if(!data.ok) throw new Error(data.error || 'Sync failed');
    if(manual) setStatus(`Synced ${data.count} draft${data.count === 1 ? '' : 's'} to Google Sheet.`);
  }catch(err){
    console.error('Sheet sync failed:', err);
    if(manual) setStatus(`Could not sync to Google Sheet: ${err.message || 'unknown error'}`, true);
  }finally{
    if(manual){
      syncBtn.disabled = false;
      syncLabel.textContent = '📤 Sync to Sheet';
    }
  }
}

syncBtn.addEventListener('click', () => syncToSheet(true));

async function addToHistory(newDrafts){
  const now = new Date();
  const label = now.toLocaleDateString('en-PH', { month:'short', day:'numeric', year:'numeric' })
    + ' · ' + now.toLocaleTimeString('en-PH', { hour:'2-digit', minute:'2-digit' });
  // Store only lightweight data (no imageData blobs — too heavy for a Sheet cell)
  const lightDrafts = newDrafts.map(d => ({
    id: d.id,
    headline: d.headline,
    source: d.source,
    url: d.url,
    category: d.category,
    caption: d.caption,
    graphicCaption: d.graphicCaption,
    imageUrl: d.imageUrl,
    highlight_words: d.highlight_words,
    createdAt: d.createdAt,
  }));
  const session = { sessionId: `s_${now.getTime()}`, date: now.toISOString(), label, drafts: lightDrafts };
  history_sessions.unshift(session); // optimistic local update, followed immediately by render()

  try{
    const res = await fetch(SHEETS_SYNC_URL, {
      method: 'POST',

  }catch(err){
    console.error('History sync failed:', err);

  }
}

// Scans the full drafts list and returns the set of draft IDs that share
// an article URL or a normalized headline with at least one other draft —
// used to show a "Possible duplicate" badge so duplicates that slip past
// generation-time dedup (e.g. re-worded headlines) are still visible and
// easy to clean up manually.
function computeDuplicateIds(list){
  const urlFirstId = new Map();
  const headlineFirstId = new Map();
  const dupeIds = new Set();

  list.forEach(d => {
    const url = (d.url || '').trim().toLowerCase();
    const headline = normalizeForDupe(d.headline);

    if(url){
      if(urlFirstId.has(url)){
        dupeIds.add(d.id);
        dupeIds.add(urlFirstId.get(url));
      } else {
        urlFirstId.set(url, d.id);
      }
    }
    if(headline){
      if(headlineFirstId.has(headline)){
        dupeIds.add(d.id);
        dupeIds.add(headlineFirstId.get(headline));
      } else {
        headlineFirstId.set(headline, d.id);
      }
    }
  });

  return dupeIds;
}

  const d = document.createElement('div');

}

feed.addEventListener('click', async (e) => {

  if(!btn) return;
  const id = btn.dataset.id;
  const d = drafts.find(x => x.id === id);
  if(!d) return;
  const action = btn.dataset.action;

  if(action === 'copy'){

// ── Live USD→PHP exchange rate ──────────────────────────────────
// Free, no-API-key endpoint (open.er-api.com) — updates once a day.
// Cached in localStorage for a few hours so repeated "Generate drafts"
// clicks don't refetch every time; falls back to a fixed approximate
// rate if the fetch fails (offline, endpoint down, etc.) so caption
// generation never blocks on this.
const USD_PHP_FALLBACK_RATE = 61.50;
const USD_PHP_RATE_URL = "https://open.er-api.com/v6/latest/USD";
const USD_PHP_CACHE_KEY = "usd_php_rate_cache";
const USD_PHP_CACHE_TTL_MS = 12 * 60 * 60 * 1000; // 12 hours

async function getUsdToPhpRate(){
  try{
    const cached = localStorage.getItem(USD_PHP_CACHE_KEY);
    if(cached){
      const parsed = JSON.parse(cached);
      if(typeof parsed.rate === 'number' && (Date.now() - parsed.fetchedAt) < USD_PHP_CACHE_TTL_MS){
        return parsed.rate;
      }
    }
  }catch(e){ /* ignore bad cache, fall through to fetch */ }

  try{
    const res = await fetch(USD_PHP_RATE_URL);
    if(!res.ok) throw new Error(`rate API returned ${res.status}`);
    const data = await res.json();
    const rate = data && data.rates && data.rates.PHP;
    if(typeof rate !== 'number' || !(rate > 0)) throw new Error('PHP rate missing from response');
    try{ localStorage.setItem(USD_PHP_CACHE_KEY, JSON.stringify({ rate, fetchedAt: Date.now() })); }catch(e){}
    return rate;
  }catch(err){
    console.warn('Could not fetch live USD-PHP rate, using fallback:', err);
    return USD_PHP_FALLBACK_RATE;
  }
}

// Normalizes a headline for duplicate comparison — lowercase, strip
// punctuation, collapse whitespace — so "AMD's RX 9070 Just Got..." and
// "AMD RX 9070 just got..." are recognized as the same story.
function normalizeForDupe(str){
  return (str || '')
    .toLowerCase()
    .replace(/[^\p{L}\p{N}]+/gu, ' ')
    .trim();
}

// Detects a URL that's just the site's homepage or a bare
// category/section page rather than a specific article — e.g.
// "https://example.com/", "https://example.com/news", or
// "https://example.com/category/gpu/". Used to stop those from being
// shown/linked as if they were the actual source article.
function isHomepageUrl(url){
  try{
    const u = new URL(url);
    const path = u.pathname.replace(/\/+$/, ''); // strip trailing slash(es)
    if(path === '') return true; // just the domain root
    const segments = path.split('/').filter(Boolean);
    // A single short segment with no digits/dashes-with-numbers usually
    // means a section/category page (e.g. /news, /reviews, /gpu) rather
    // than a specific article slug.
    if(segments.length === 1 && segments[0].length <= 20 && !/\d/.test(segments[0])){
      return true;
    }
    return false;
  }catch(e){
    return true; // not a valid absolute URL — treat as unusable
  }
}

function fetchImageAsDataUrl(url){
  return new Promise((resolve, reject) => {
    if(!url){ reject(new Error('No image URL')); return; }
    // Route through Worker proxy to bypass CORS restrictions
    const proxied = `${PROXY_URL.replace(/\/$/, '')}/proxy-image?url=${encodeURIComponent(url)}`;
    const img = new Image();
    img.crossOrigin = 'anonymous';
    const timeout = setTimeout(() => reject(new Error('Timed out')), 15000);
    img.onload = () => {
      clearTimeout(timeout);
      try{
        let w = img.width, h = img.height;
        const maxDim = 1080;
        if(w >= h && w > maxDim){ h = Math.round(h * maxDim / w); w = maxDim; }
        else if(h > w && h > maxDim){ w = Math.round(w * maxDim / h); h = maxDim; }
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(c.toDataURL('image/jpeg', 0.85));
      }catch(e){
        reject(e);
      }
    };
    img.onerror = () => { clearTimeout(timeout); reject(new Error('Image failed to load')); };
    img.src = proxied;
  });
}

// Automatically tries to pull the article's hero photo for every new draft,
// one at a time (kinder to the proxy than firing them all in parallel).
// Silent per-draft failures — those cards just fall back to the manual
// "Try fetch from article" / "Upload photo" buttons.
async function autoFetchPhotos(newDrafts){
  const candidates = newDrafts.filter(d => d.imageUrl);
  if(!candidates.length) return;
  let done = 0;
  setStatus(`Auto-fetching photos… (0/${candidates.length})`);
  for(const d of candidates){
    try{
      const dataUrl = await fetchImageAsDataUrl(d.imageUrl);
      // Draft may have been deleted while we were fetching — guard against that
      const live = drafts.find(x => x.id === d.id);
      if(live){
        live.imageData = dataUrl;
        await saveDrafts();
        render();
      }
    }catch(err){
      console.warn('Auto-fetch failed for', d.headline, err);
    }
    done++;
    setStatus(`Auto-fetching photos… (${done}/${candidates.length})`);
  }
  setStatus('');
}

// Asks the AI (via the same Worker proxy used for drafts) to write a
// single, vivid image-generation prompt for this specific story — meant
// to be pasted into ChatGPT's image generator (or DALL·E/similar) so
// every post can get a unique graphic even when no real photo is
// available or wanted. This only returns TEXT — it does not create an
// image itself, and never blocks the existing "upload your own photo"
// or "fetch from article" options.
async function generateImagePrompt(d){
  const systemPrompt = `You are a visual prompt writer for a Filipino PC hardware/tech news page. Given a news headline, category, and caption, write ONE single, vivid, highly-specific prompt for an AI image generator (ChatGPT/DALL·E style) that will produce a unique, on-brand square (1:1) editorial graphic for this story.

Rules for the prompt you write:
- Describe a concrete visual scene (product, setting, lighting, mood, composition) — not abstract concepts.
- Match the category's subject matter (GPU/CPU/motherboard/peripheral/etc.) with plausible, generic hardware — do not name specific real brand logos or trademarked packaging designs.
- Aesthetic: dark, moody tech-editorial look — deep green/black tones, subtle neon or copper accent lighting, high detail, photorealistic or clean 3D render style.
- Explicitly state: no text, no logos, no watermarks, no captions in the image.
- Aspect ratio: square, 1:1.
- Length: 2-4 sentences.

Respond with ONLY the prompt text itself — no preamble, no quotes, no markdown, no labels like "Prompt:".`;

  const userPrompt = `Headline: ${d.headline}\nCategory: ${d.category || 'General'}\nCaption: ${d.graphicCaption != null ? d.graphicCaption : d.caption}`;

  const response = await fetch(PROXY_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ systemPrompt, prompt: userPrompt })
  });

  if(!response.ok){
    let detail = '';
    try{ detail = (await response.json()).error || ''; }catch(e){}
    throw new Error(`API error ${response.status}${detail ? ': ' + detail : ''}`);
  }

  const data = await response.json();
  if(data.error) throw new Error(data.error);

  const text = (data.text || '').trim();
  if(!text) throw new Error('No response from AI — please try again.');
  return text;
}

function compressImage(file, maxDim, quality){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if(w >= h && w > maxDim){ h = Math.round(h * maxDim / w); w = maxDim; }
        else if(h > w && h > maxDim){ w = Math.round(w * maxDim / h); h = maxDim; }
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(c.toDataURL('image/jpeg', quality));
      };
      img.onerror = () => reject(new Error('Image load failed'));
      img.src = reader.result;
    };
    reader.onerror = () => reject(new Error('File read failed'));
    reader.readAsDataURL(file);
  });
}

function roundRect(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function wrapAndDrawHeadline(ctx, text, highlightWords, x, y, maxWidth, lineHeight){
  const words = (text || '').split(/\s+/).filter(Boolean);
  const highlightSet = new Set((highlightWords || []).map(w => w.toLowerCase()));
  let cx = x, cy = y;
  words.forEach(word => {
    const clean = word.replace(/[^\p{L}\p{N}]/gu, '').toLowerCase();
    const wWidth = ctx.measureText(word + ' ').width;
    if(cx + wWidth > x + maxWidth){
      cx = x; cy += lineHeight;
    }
    ctx.fillStyle = highlightSet.has(clean) ? '#c9885a' : '#f4f7f5';
    ctx.fillText(word, cx, cy);
    cx += wWidth;
  });
}

// Wrap text and return array of lines (for pre-measuring height)
function measureWrappedLines(ctx, text, maxWidth){
  const words = (text || '').split(/\s+/).filter(Boolean);
  const lines = [];
  let line = '';
  words.forEach(word => {
    const test = line ? line + ' ' + word : word;
    if(ctx.measureText(test).width > maxWidth && line){
      lines.push(line);
      line = word;
    } else {
      line = test;
    }
  });
  if(line) lines.push(line);
  return lines;
}

// Draw wrapped text with per-word highlight support
function drawWrappedHighlighted(ctx, text, highlightWords, x, y, maxWidth, lineH, normalColor, highlightColor){
  const highlightSet = new Set((highlightWords || []).map(w => w.toLowerCase()));
  const words = (text || '').split(/\s+/).filter(Boolean);
  let cx = x, cy = y;
  words.forEach(word => {
    const wWidth = ctx.measureText(word + ' ').width;
    if(cx + wWidth - ctx.measureText(' ').width > x + maxWidth && cx !== x){
      cx = x; cy += lineH;
    }
    const clean = word.replace(/[^\p{L}\p{N}]/gu, '').toLowerCase();
    ctx.fillStyle = highlightSet.has(clean) ? highlightColor : normalColor;
    ctx.fillText(word, cx, cy);
    cx += wWidth;
  });
  return cy; // return last y used
}

// Wraps text into an array of lines, where each line is an array of words
// (not a joined string) — needed so we can measure and center each line
// individually rather than left-aligning from a fixed x.
function wrapWordsIntoLines(ctx, text, maxWidth){
  const words = (text || '').split(/\s+/).filter(Boolean);
  const lines = [];
  let currentLine = [];
  let currentWidth = 0;
  const spaceWidth = ctx.measureText(' ').width;
  words.forEach(word => {
    const wWidth = ctx.measureText(word).width;
    const addedWidth = currentLine.length ? spaceWidth + wWidth : wWidth;
    if(currentWidth + addedWidth > maxWidth && currentLine.length){
      lines.push(currentLine);
      currentLine = [word];
      currentWidth = wWidth;
    } else {
      currentLine.push(word);
      currentWidth += addedWidth;
    }
  });
  if(currentLine.length) lines.push(currentLine);
  return lines;
}

// Draws pre-wrapped lines (from wrapWordsIntoLines) centered horizontally
// around centerX, with per-word highlight support. Returns the y position
// after the last line.
function drawCenteredHighlightedLines(ctx, lines, highlightWords, centerX, startY, lineH, normalColor, highlightColor){
  const highlightSet = new Set((highlightWords || []).map(w => w.toLowerCase()));
  const spaceWidth = ctx.measureText(' ').width;
  let y = startY;
  lines.forEach(lineWords => {
    let totalWidth = 0;
    lineWords.forEach((w, i) => {
      totalWidth += ctx.measureText(w).width;
      if(i < lineWords.length - 1) totalWidth += spaceWidth;
    });
    let x = centerX - totalWidth / 2;
    lineWords.forEach(word => {
      const clean = word.replace(/[^\p{L}\p{N}]/gu, '').toLowerCase();
      ctx.fillStyle = highlightSet.has(clean) ? highlightColor : normalColor;
      ctx.fillText(word, x, y);
      x += ctx.measureText(word).width + spaceWidth;
    });
    y += lineH;
  });
  return y;
}

const CATEGORY_STYLES = {
  GPU: { color: '#4ade80', label: 'GPU' },
  CPU: { color: '#e0b04a', label: 'CPU' },
  Storage: { color: '#5aa9e0', label: 'SSD' },
  Motherboard: { color: '#c9885a', label: 'MOBO' },
  Peripherals: { color: '#8fa89a', label: 'I/O' },
  Cooling: { color: '#4ac9e0', label: 'FAN' },
  PSU: { color: '#e0685a', label: 'PSU' },
  General: { color: '#4ade80', label: 'TECH' }
};
function getCategoryStyle(category){
  return CATEGORY_STYLES[category] || CATEGORY_STYLES.General;
}

// Procedurally generated background used whenever there's no real photo
// (fetch blocked, not uploaded yet) — a category-tinted circuit pattern
// plus a badge, so every draft still gets a distinct, on-brand graphic
// instead of an empty box. 100% drawn with canvas primitives, no external
// images, so there's no copyright concern.
function drawCategoryBackground(ctx, W, imgAreaH, category){
  const style = getCategoryStyle(category);

  const grad = ctx.createLinearGradient(0, 0, 0, imgAreaH);
  grad.addColorStop(0, '#0f1613');
  grad.addColorStop(1, '#0a0f0d');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, imgAreaH);

  // diagonal circuit-style line pattern, tinted with the category color
  ctx.save();
  ctx.beginPath();
  ctx.rect(0, 0, W, imgAreaH);
  ctx.clip();
  ctx.strokeStyle = style.color;
  ctx.globalAlpha = 0.16;
  ctx.lineWidth = 2;
  const step = 64;
  for(let x = -imgAreaH; x < W + imgAreaH; x += step){
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x + imgAreaH, imgAreaH);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
  ctx.restore();

  // center badge: ring + category label
  const cx = W / 2, cy = imgAreaH / 2;
  const r = Math.min(W, imgAreaH) * 0.22;

  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  ctx.fill();
  ctx.lineWidth = 3;
  ctx.strokeStyle = style.color;
  ctx.globalAlpha = 0.7;
  ctx.stroke();
  ctx.globalAlpha = 1;
  ctx.restore();

  ctx.save();
  ctx.font = `800 60px "IBM Plex Mono", monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = style.color;
  ctx.fillText(style.label, cx, cy);
  ctx.restore();
}

function drawGraphic(d){
  return new Promise((resolve) => {
    const canvas = document.getElementById(`canvas-${d.id}`);
    if(!canvas){ resolve(false); return; }
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height; // 1080 x 1080

    Promise.all([
      document.fonts.load('400 60px Anton'),
      document.fonts.load('600 26px "IBM Plex Mono"')
    ]).catch(() => {}).then(() => {

      const finishDraw = (photoImg) => {
        ctx.clearRect(0, 0, W, H);

        // ── Layout constants ──────────────────────────────────
        const PAD = 64;
        const CAPTION_SIZE = 54;
        const LINE_H_CAP = 62;
        const HANDLE_SIZE = 24;
        const STRIP_GAP = 0;    // photo runs straight into the light band, no dark gradient gap
        const INNER_PAD_TOP = 36;
        const INNER_PAD_BOT = 56;

        // The single big caption line — this is the field literally meant
        // for "text on image", styled here as the bold condensed headline.
        const bandText = (d.graphicCaption != null ? d.graphicCaption : d.caption).toUpperCase();

        ctx.font = `400 ${CAPTION_SIZE}px Anton, sans-serif`;
        const capLines = wrapWordsIntoLines(ctx, bandText, W - PAD * 2);
        const capH = capLines.length * LINE_H_CAP;

        ctx.font = `600 ${HANDLE_SIZE}px "IBM Plex Mono", monospace`;
        const handleH = HANDLE_SIZE + 16 + 28; // pill height + gap before caption

        const stripH = INNER_PAD_TOP + handleH + capH + INNER_PAD_BOT;
        let imgAreaH = H - STRIP_GAP - stripH;

        // Let the photo take up most of the frame — this style has only
        // one short text block below it, so it can afford to be much
        // larger than the old dark layout's photo area.
        const MAX_IMG_RATIO = 0.76;
        const maxImgAreaH = Math.round(H * MAX_IMG_RATIO);
        if(imgAreaH > maxImgAreaH){
          imgAreaH = maxImgAreaH;
        }
        const actualStripH = H - STRIP_GAP - imgAreaH;
        const stripTopPad = INNER_PAD_TOP + Math.max(0, (actualStripH - stripH) / 2);

        const BAND_BG = '#f2efe7';
        const TEXT_DARK = '#161a17';
        const HIGHLIGHT_GREEN = '#1c8a4c';

        ctx.fillStyle = BAND_BG;
        ctx.fillRect(0, 0, W, H);

        if(photoImg){
          // ── Draw real photo (top, cover-fit) ─────────────────
          const scale = Math.max(W / photoImg.width, imgAreaH / photoImg.height);
          const iw = photoImg.width * scale, ih = photoImg.height * scale;
          const ix = (W - iw) / 2, iy = (imgAreaH - ih) / 2;
          ctx.save();
          ctx.beginPath();
          ctx.rect(0, 0, W, imgAreaH);
          ctx.clip();
          ctx.drawImage(photoImg, ix, iy, iw, ih);
          ctx.restore();
        } else {
          // ── No photo available — auto category background ───
          drawCategoryBackground(ctx, W, imgAreaH, d.category);
        }

        // ── Light band below photo ─────────────────────────────
        const stripY = imgAreaH + STRIP_GAP;
        ctx.fillStyle = BAND_BG;
        ctx.fillRect(0, stripY, W, H - stripY);

        // ── @handle pill (white, centered, top of the band) ────
        ctx.font = `600 ${HANDLE_SIZE}px "IBM Plex Mono", monospace`;
        ctx.textAlign = 'left';
        ctx.textBaseline = 'alphabetic';
        const handle = PAGE_NAME ? `@${PAGE_NAME.toLowerCase().replace(/\s+/g,'')}` : '@tpknows';
        const pW = ctx.measureText(handle).width + 32;
        const pH = HANDLE_SIZE + 16;
        const pillX = (W - pW) / 2;
        const pillTopY = stripY + stripTopPad;
        const pillTextY = pillTopY + pH / 2 + HANDLE_SIZE * 0.35;
        roundRect(ctx, pillX, pillTopY, pW, pH, pH / 2);
        ctx.fillStyle = '#ffffff';
        ctx.fill();
        ctx.fillStyle = TEXT_DARK;
        ctx.textAlign = 'center';
        ctx.fillText(handle, pillX + pW / 2, pillTextY);

        // ── Big bold condensed caption, centered, highlighted words
        // in the app's green accent, rest in near-black ────────────
        let ty = pillTopY + pH + 28 + CAPTION_SIZE * 0.85;
        ctx.font = `400 ${CAPTION_SIZE}px Anton, sans-serif`;
        ctx.textAlign = 'left';
        ctx.textBaseline = 'alphabetic';
        drawCenteredHighlightedLines(ctx, capLines, d.highlight_words, W / 2, ty, LINE_H_CAP, TEXT_DARK, HIGHLIGHT_GREEN);

        resolve(true);
      };

      if(d.imageData){
        const img = new Image();
        img.onload = () => finishDraw(img);
        img.onerror = () => { setStatus('Could not render that photo — using category background instead.', true); finishDraw(null); };
        img.src = d.imageData;
      } else {
        finishDraw(null);
      }
    });
  });
}

// Shared writing-style / JSON-schema instructions used for every batch call,
// whether it's a broad search or a single-source scoped search.
function buildCaptionInstructions(usdToPhpRate){
  return `For each news item, write TWO captions in the same voice — one short for the image graphic, one longer and more detailed for the actual Facebook feed post:

Both should be:
- INTELLECTUALLY SHARP — show real understanding of WHY this matters. Connect the dots. Reference context (architecture generations, market positioning, historical comparisons, what this means for builders or buyers). Sound like someone who has built hundreds of PCs and read every spec sheet.
- WITTY WITHOUT TRYING TOO HARD — clever wordplay, a well-placed analogy, dry humor, or a surprising take. Not memes, not cringe. Think: tech columnist with personality, not hype beast.
- CONVERSATIONAL BUT ELEVATED — confident, direct, occasionally self-aware. Write how an intelligent Filipino tech creator actually thinks out loud.
- FIRST LINE = HOOK — open with a sharp observation, a contrarian take, an unexpected analogy, or a question that makes someone stop scrolling. Never start with the brand name or "AMD announces...".

"caption_graphic" — the short punchy hook that gets rendered directly on the image in big bold display type. This is now the ONLY text on the graphic itself, so it has to work completely on its own, like a viral page's teaser line — think "MOUNT ETNA'S ERUPTION CREATES A SKY EFFECT THAT LOOKS LIKE A FLAMING PHOENIX, GOES VIRAL!" energy, not a spec sheet:
- 12-25 words, ONE flowing sentence (or two short clauses joined naturally). This is a hook, not an explanation — save the "why it matters" breakdown for caption_feed.
- MUST be witty and a little bit dramatic — clever wordplay, a surprising comparison, a wink at the reader, mild hyperbole. It's fine to sound like clickbait-with-a-brain ("goes viral," "here's why," "and it's wild") as long as every claim in it is still true to the actual story — style can be exaggerated, facts cannot.
- Since it renders in huge bold all-caps letters, favor punchier/shorter words where you can — long words wrap awkwardly at that size.
- No hashtags, no emoji.
- English-dominant, since this is the fast 2-second scannable hook on the photo itself — but a short Taglish interjection at the start ("Grabe," "Sana all,") is fine if it lands naturally.

Examples of the tone to hit for caption_graphic specifically:
- "AMD just quietly killed Intel's price advantage — and barely anyone noticed."
- "This ₱15K GPU price cut is either genius or a warning sign. Maybe both."
- "The RTX 5060 just got cheaper, and PC builders are losing their minds."
- "A cooler that's basically a jet engine strapped to your CPU. Bold choice."

"caption_feed" — the longer version that gets posted as the actual Facebook status/feed text:
- 120-200 words. Go deeper than the graphic version: unpack the specs or numbers that matter, give your actual read on whether this is a big deal or overhyped, add a comparison to a prior generation or a rival product, and give buyers/builders concrete guidance (worth waiting for, worth upgrading, skip it, etc.).
- GENUINELY TAGLISH, NOT JUST ENGLISH WITH A SPRINKLE OF TAGALOG — actually code-switch the way a witty, tech-savvy Filipino creator talks online: reactions, opinions, and punchlines land naturally in Tagalog ("Grabe, ang laki ng price cut", "Sulit ba? Depende sa build mo", "Wag muna sumigaw ng 'day one purchase'"), while technical terms, specs, and numbers stay in English since that's how Filipino builders actually talk. Should read like a smart kaibigan explaining tech over coffee, not a press release translated into Filipino.
- Still end with 3-5 tight, relevant hashtags.

Examples of the tone to aim for:
- "Intel just proved that sometimes the best way to win a benchmark is to redefine what you're benchmarking."
- "A 4nm node shrink on a GPU that already runs hot. Brave choice. Bold strategy. Let's see if the thermals agree."
- "Paying ₱8,000 more for 4% more performance is technically a choice. So is lighting your money on fire."
- "Grabe, akala mo bagong henerasyon na — pero same silicon lang pala, binaguhan lang ng pangalan at presyo. Marketing win, hindi engineering win."

CURRENCY — MAKE PRICES RELATABLE TO A FILIPINO AUDIENCE:
- Whenever the news mentions a US dollar price, price cut, or cost (MSRP, sale price, price difference, etc.), convert it to Philippine peso using approximately ₱${usdToPhpRate.toFixed(2)} per $1 USD (today's rate, rounded sensibly, no decimal cents in the caption itself) and lead with the peso figure — e.g. "a $50 price cut" becomes "a ~₱${Math.round(50 * usdToPhpRate).toLocaleString('en-PH')} price cut" or "now ~₱${Math.round(50 * usdToPhpRate).toLocaleString('en-PH')} cheaper (about $50)".
- This rate is an approximation and drifts daily — treat it as "roughly" rather than exact, and don't present it as a precise bank rate.
- Do this in BOTH caption_graphic and caption_feed. Raw, unconverted dollar figures should not appear alone — Filipino buyers think in pesos.

CRITICAL — "url" FIELD RULES:
- "url" must be the exact, direct link to the specific news article — the full path to that one story, not the outlet's homepage, not a category/section/tag page (e.g. never something like "https://example.com/" or "https://example.com/news/"), and not a search-results page.
- Only return a url you actually retrieved from search results — never construct, guess, or shorten one.
- If you cannot find that specific article's direct URL, set "url" to an empty string ("") rather than falling back to the homepage or guessing.

Respond with ONLY a raw JSON array (no markdown fences, no commentary) where each item has exactly these fields:
[{"headline": "...", "source": "publication name", "url": "the exact direct article URL, or empty string if unknown — never the homepage", "image_url": "direct URL to the article's main/hero image if you can identify one, otherwise empty string", "category": "GPU|CPU|Storage|Motherboard|Peripherals|Cooling|PSU|General", "caption_graphic": "the short caption for the image graphic", "caption_feed": "the longer, more detailed caption for the Facebook feed post", "highlight_words": ["1-3 key words or short product names from the headline to visually emphasize, e.g. product names, brand names, or standout numbers"]}]`;
}

function buildSystemPrompt(scopeConstraint, usdToPhpRate){
  return `You are the voice behind "${PAGE_NAME}" — a Filipino tech page run by someone who actually knows hardware inside-out: a builder, a repair tech, and a sharp observer of the industry. You write Facebook captions that sound like they came from the smartest, wittiest person in the room who also happens to explain things better than most tech journalists.

${scopeConstraint}

${buildCaptionInstructions(usdToPhpRate)}`;
}

function sleep(ms){ return new Promise(res => setTimeout(res, ms)); }

// Calls the proxy once with a given system/user prompt pair and returns the
// parsed items array. Throws on hard failures (bad API response, unparsable
// JSON) — but an empty array is a valid, non-error result (e.g. a single
// source simply had nothing new this month). Retries once after a short
// backoff on a 5xx/network failure, since those are usually transient
// (rate limits, brief timeouts) rather than a real problem with the prompt.
async function fetchNewsBatch(systemPrompt, userPrompt, attempt = 1){
  let response;
  try{
    response = await fetch(PROXY_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ systemPrompt, prompt: userPrompt })
    });
  }catch(networkErr){
    if(attempt < 2){
      await sleep(2500);
      return fetchNewsBatch(systemPrompt, userPrompt, attempt + 1);
    }
    throw new Error(`Network error reaching the AI proxy: ${networkErr.message || 'unknown error'}`);
  }

  if(!response.ok){
    // Read as raw text first — a Cloudflare 500 is often an HTML error page,
    // not JSON, so response.json() alone would silently swallow the detail.
    const rawText = await response.text().catch(() => '');
    let detail = rawText;
    try{ const parsed = JSON.parse(rawText); detail = parsed.error || rawText; }catch(e){ /* not JSON, keep raw text */ }
    console.warn(`Proxy returned ${response.status} (attempt ${attempt}):`, detail);

    if(response.status >= 500 && attempt < 2){
      await sleep(2500);
      return fetchNewsBatch(systemPrompt, userPrompt, attempt + 1);
    }
    throw new Error(`API error ${response.status}${detail ? ': ' + detail.slice(0, 200) : ''}`);
  }

  const data = await response.json();
  if(data.error) throw new Error(data.error);

  const text = data.text || '';
  if(!text.trim()){
    throw new Error('No response from AI — please try again.');
  }

  const cleaned = text.replace(/```json|```/g, '').trim();
  const jsonMatch = cleaned.match(/\[[\s\S]*\]/);
  if(!jsonMatch) throw new Error('Response did not contain valid JSON — it may have been cut off.');

  let items;
  try{
    items = JSON.parse(jsonMatch[0]);
  }catch(parseErr){
    throw new Error('Could not parse the response JSON (likely truncated). Try again.');
  }
  return Array.isArray(items) ? items : [];
}

// Splits the range from monthStart through today into ~7-day chunks. A
// single "find everything this month" search tends to only surface a
// handful of top hits — chunking forces a fresh, separate search per
// window, which is what actually gets closer to ALL of a month's stories
// instead of just the most recent one or two.
function computeWeekChunks(monthStart, today){
  const chunks = [];
  let chunkStart = new Date(monthStart);
  while(chunkStart <= today){
    let chunkEnd = new Date(chunkStart);
    chunkEnd.setDate(chunkEnd.getDate() + 6);
    if(chunkEnd > today) chunkEnd = new Date(today);
    chunks.push({ start: new Date(chunkStart), end: new Date(chunkEnd) });
    chunkStart = new Date(chunkEnd);
    chunkStart.setDate(chunkStart.getDate() + 1);
  }
  return chunks;
}

async function generateDrafts(){
  genBtn.disabled = true;
  genLabel.innerHTML = '<span class="spinner"></span> Searching for news…';

  const usdToPhpRate = await getUsdToPhpRate();
  const isMonth = scanMode === 'month';
  const today = new Date();

  let items = [];
  const sourceErrors = [];

  try{
    if(isMonth){
      const monthStart = new Date(today.getFullYear(), today.getMonth(), 1);
      const weekChunks = computeWeekChunks(monthStart, today);
      const totalCalls = sources.length > 0 ? sources.length * weekChunks.length : weekChunks.length;
      let callIndex = 0;

      if(sources.length > 0){
        // Full exhaustive sweep: one call per SOURCE per WEEK, so no single
        // search has to surface an entire month's worth of one outlet's
        // stories at once.
        for(let si = 0; si < sources.length; si++){
          const source = sources[si];
          for(let wi = 0; wi < weekChunks.length; wi++){
            const chunk = weekChunks[wi];
            callIndex++;
            if(callIndex > 1) await sleep(1500); // pace out calls to the proxy/Gemini
            const rangeText = `from ${chunk.start.toDateString()} through ${chunk.end.toDateString()}`;
            genLabel.innerHTML = `<span class="spinner"></span> ${source} — week ${wi + 1}/${weekChunks.length} (source ${si + 1}/${sources.length})`;
            setStatus(`Searching ${source}, ${rangeText}… (call ${callIndex}/${totalCalls})`);
            const scopeConstraint = `Only use this one source: ${source}. Do not use any other outlet. Find ALL relevant PC hardware/component news articles this specific outlet published ${rangeText}. Return EVERY qualifying story published in that exact window, even if there are several — this is a narrow one-week slice, so completeness matters more than picking just the "best" one.`;
            const userPrompt = `Find every PC hardware/component news article "${source}" published ${rangeText}, and write the Facebook caption drafts as specified for each one.`;
            const systemPrompt = buildSystemPrompt(scopeConstraint, usdToPhpRate);
            try{
              const sourceItems = await fetchNewsBatch(systemPrompt, userPrompt);
              items = items.concat(sourceItems);
            }catch(err){
              console.warn(`Search failed for source "${source}" (${rangeText}):`, err);
              sourceErrors.push(`${source} (week of ${chunk.start.toDateString()})`);
            }
          }
        }
      } else {
        // No sources configured — still chunk by week for thoroughness,
        // just without the per-source nesting.
        for(let wi = 0; wi < weekChunks.length; wi++){
          const chunk = weekChunks[wi];
          callIndex++;
          if(callIndex > 1) await sleep(1500);
          const rangeText = `from ${chunk.start.toDateString()} through ${chunk.end.toDateString()}`;
          genLabel.innerHTML = `<span class="spinner"></span> Searching week ${wi + 1}/${weekChunks.length}…`;
          setStatus(`Searching hardware news, ${rangeText}… (week ${wi + 1}/${weekChunks.length})`);
          const scopeConstraint = `Search broadly across reputable tech hardware outlets. Find ALL relevant PC hardware/component news articles published ${rangeText}. Return every qualifying story from that window, not just the top one or two.`;
          const userPrompt = `Find PC hardware/component news published ${rangeText} and write the Facebook caption drafts as specified. Return every distinct qualifying article from that window.`;
          const systemPrompt = buildSystemPrompt(scopeConstraint, usdToPhpRate);
          try{
            const weekItems = await fetchNewsBatch(systemPrompt, userPrompt);
            items = items.concat(weekItems);
          }catch(err){
            console.warn(`Search failed for week ${rangeText}:`, err);
            sourceErrors.push(`week of ${chunk.start.toDateString()}`);
          }
        }
      }
    } else {
      // Quick "today" mode — one combined call, fast, for daily checks.
      setStatus(`Fetching today's PC hardware/component news…`);
      const dateRangeText = `today, ${today.toDateString()}`;
      const scopeConstraint = sources.length > 0
        ? `Only use these sources — search site-by-site if needed, and skip any story you can't attribute to one of them: ${sources.join(', ')}. Do not use any other outlet. Find PC hardware/component news published ${dateRangeText}.`
        : `Search broadly across reputable tech hardware outlets. Find PC hardware/component news published ${dateRangeText}.`;
      const userPrompt = `Find today's PC hardware/component news and write the Facebook caption drafts as specified. Today's date is ${today.toDateString()}.`;
      const systemPrompt = buildSystemPrompt(scopeConstraint, usdToPhpRate);
      items = await fetchNewsBatch(systemPrompt, userPrompt);
    }

    if(items.length === 0){
      throw new Error(sourceErrors.length
        ? `Could not get results from any source/week (${sourceErrors.join(', ')}).`
        : `No news items came back${isMonth ? ' for this month' : ' for today'} — try again or widen your sources list.`);
    }

    // Skip anything already in your current drafts OR already seen in past
    // History sessions — same article URL, or a headline that's basically
    // the same story worded differently. Checking History too means a
    // month-long sweep won't keep re-adding stories you already processed
    // and deleted earlier.
    const historyUrls = new Set();
    const historyHeadlines = new Set();
    history_sessions.forEach(session => {
      (session.drafts || []).forEach(d => {
        if(d.url) historyUrls.add(d.url.trim().toLowerCase());
        if(d.headline) historyHeadlines.add(normalizeForDupe(d.headline));
      });
    });

    const existingUrls = new Set([...drafts.filter(d => d.url).map(d => d.url.trim().toLowerCase()), ...historyUrls]);
    const existingHeadlines = new Set([...drafts.map(d => normalizeForDupe(d.headline)), ...historyHeadlines]);
    const seenInBatchUrls = new Set();
    const seenInBatchHeadlines = new Set();
    let duplicatesSkipped = 0;

    const freshItems = items.filter(it => {
      const url = (it.url || '').trim().toLowerCase();
      const headline = normalizeForDupe(it.headline);
      const isDupe =
        (url && (existingUrls.has(url) || seenInBatchUrls.has(url))) ||
        (headline && (existingHeadlines.has(headline) || seenInBatchHeadlines.has(headline)));
      if(isDupe){
        duplicatesSkipped++;
        return false;
      }
      if(url) seenInBatchUrls.add(url);
      if(headline) seenInBatchHeadlines.add(headline);
      return true;
    });

    const now = Date.now();
    let homepageUrlsDropped = 0;
    const newDrafts = freshItems.map((it, i) => {
      const graphicCap = it.caption_graphic || it.caption || '';
      const feedCap = it.caption_feed || it.caption || graphicCap;
      let url = it.url || '';
      if(url && isHomepageUrl(url)){
        // AI gave us the site's homepage/section page instead of the actual
        // article — that's worse than no link at all, so drop it rather
        // than pointing people to the wrong page.
        url = '';
        homepageUrlsDropped++;
      }
      // Keep the graphic's on-image text short (no raw URL clutter) —
      // the longer feed caption gets a "Read more" line with the source
      // link appended, since that's the one actually posted to Facebook.
      const captionWithSource = url ? `${feedCap}\n\nRead more: ${url}` : feedCap;
      return {
        id: `d_${now}_${i}`,
        headline: it.headline || 'Untitled',
        source: it.source || '',
        url,
        category: it.category || 'General',
        caption: captionWithSource,
        graphicCaption: graphicCap,
        highlight_words: Array.isArray(it.highlight_words) ? it.highlight_words : [],
        imageUrl: it.image_url || '',
        imageData: null,
        imagePrompt: null,
        promptCopied: false,
        status: 'draft',
        createdAt: now
      };
    });

    drafts = [...newDrafts, ...drafts];
    await saveDrafts(true);
    if(newDrafts.length > 0) await addToHistory(newDrafts); // auto-save every generation to history
    currentFilter = 'all';
    [...tabs.children].forEach(b => b.classList.toggle('active', b.dataset.filter === 'all'));
    render();
    if(newDrafts.length > 0) autoFetchPhotos(newDrafts); // background, non-blocking — fills in imageData as each resolves

    const notes = [];
    if(duplicatesSkipped) notes.push(`skipped ${duplicatesSkipped} duplicate${duplicatesSkipped === 1 ? '' : 's'} already in your drafts or history`);
    if(homepageUrlsDropped) notes.push(`${homepageUrlsDropped} had no exact article link — source omitted`);
    if(sourceErrors.length) notes.push(`could not search ${sourceErrors.join(', ')}`);
    const noteText = notes.length ? ` (${notes.join('; ')}.)` : '';
    setStatus(`Added ${newDrafts.length} new draft${newDrafts.length === 1 ? '' : 's'}${isMonth ? " from this month's sweep" : ''}.${noteText}`);

  }catch(err){
    console.error(err);
    setStatus(`Could not generate drafts: ${err.message || 'unknown error'}`, true);
  }finally{
    genBtn.disabled = false;
    genLabel.textContent = '⚡ Generate drafts';
  }
}

genBtn.addEventListener('click', generateDrafts);

(async () => {
  setStatus('Loading your drafts and settings from Google Sheet…');
  await loadAllFromSheet();
  const inp = document.getElementById('handleInput');
  if(inp) inp.value = PAGE_NAME;
  renderSources();
  render();
  setStatus('');
})();
</script>

</body>
</html>
