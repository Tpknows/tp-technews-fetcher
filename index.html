<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tammy Padal — Tech News Drafts</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

  :root{
    --bg: #0a0f0d;
    --panel: #0f1613;
    --panel-2: #131c18;
    --line: #1e2b25;
    --trace: #4ade80;
    --trace-dim: #2f6b48;
    --copper: #c9885a;
    --text: #e8ede9;
    --text-dim: #8fa89a;
    --amber: #e0b04a;
    --gray: #5a6b63;
    --danger: #e0685a;
  }
  *{ box-sizing: border-box; }
  body{
    margin:0;
    background:
      radial-gradient(circle at 15% 0%, rgba(74,222,128,0.06), transparent 40%),
      var(--bg);
    color: var(--text);
    font-family: 'Sora', sans-serif;
    padding-bottom: 60px;
  }
  ::selection{ background: var(--trace-dim); color: #fff; }

  header{
    padding: 28px 20px 20px;
    border-bottom: 1px solid var(--line);
    position: relative;
    overflow: hidden;
  }
  header::before{
    content:'';
    position:absolute; inset:0;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 26px 26px;
    opacity: 0.25;
    mask-image: linear-gradient(to bottom, black, transparent);
  }
  .header-inner{ position: relative; max-width: 720px; margin: 0 auto; }
  .eyebrow{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--trace);
    text-transform: uppercase;
    display:flex; align-items:center; gap:8px;
  }
  .eyebrow::before{
    content:''; width:6px; height:6px; border-radius:50%;
    background: var(--trace); box-shadow: 0 0 8px var(--trace);
  }
  h1{
    font-size: 26px; font-weight: 800; margin: 10px 0 4px;
    letter-spacing: -0.01em;
  }
  .sub{ color: var(--text-dim); font-size: 14px; margin: 0; }

  main{ max-width: 720px; margin: 0 auto; padding: 20px; }

  .controls{
    display:flex; gap:10px; align-items:center; flex-wrap: wrap;
    margin-bottom: 18px;
  }
  button{
    font-family: 'Sora', sans-serif;
    border: none; cursor: pointer; border-radius: 10px;
    font-weight: 600; font-size: 14px;
    transition: transform 0.1s ease, opacity 0.15s ease;
  }
  button:active{ transform: scale(0.97); }
  .btn-primary{
    background: var(--trace); color: #05130a;
    padding: 12px 18px;
    display:flex; align-items:center; gap:8px;
  }
  .btn-primary:disabled{ opacity: 0.5; cursor: default; }
  .btn-ghost{
    background: transparent; color: var(--text-dim);
    border: 1px solid var(--line); padding: 11px 14px;
  }
  .btn-ghost.active{ color: var(--trace); border-color: var(--trace-dim); }

  .tabs{ display:flex; gap: 8px; margin-left: auto; }

  .status-line{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px; color: var(--text-dim);
    margin-bottom: 16px; min-height: 16px;
  }
  .status-line.error{ color: var(--danger); }

  .card{
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 16px;
    position: relative;
    display: flex;
    gap: 14px;
  }
  .pin{
    width: 3px; border-radius: 3px; flex-shrink: 0;
    background: var(--trace-dim);
  }
  .card[data-status="draft"] .pin{ background: var(--amber); }
  .card[data-status="approved"] .pin{ background: var(--trace); box-shadow: 0 0 10px var(--trace); }
  .card[data-status="posted"] .pin{ background: var(--gray); }

  .card-body{ flex: 1; min-width: 0; }
  .card-top{
    display:flex; justify-content: space-between; align-items: flex-start;
    gap: 10px; margin-bottom: 8px;
  }
  .tag-row{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .cat{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px; letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--copper); border: 1px solid var(--copper);
    padding: 2px 7px; border-radius: 5px;
  }
  .status-pill{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 2px 7px; border-radius: 5px; color: var(--text-dim);
  }
  .card[data-status="draft"] .status-pill{ color: var(--amber); }
  .card[data-status="approved"] .status-pill{ color: var(--trace); }
  .card[data-status="posted"] .status-pill{ color: var(--gray); }

  .headline{ font-size: 16px; font-weight: 700; margin: 0 0 4px; line-height: 1.35; }
  .source-line{ font-size: 12px; color: var(--text-dim); margin: 0 0 12px; }
  .source-line a{ color: var(--text-dim); }

  textarea{
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Sora', sans-serif;
    font-size: 14px;
    line-height: 1.55;
    padding: 12px;
    resize: vertical;
    min-height: 100px;
  }
  textarea:focus{ outline: none; border-color: var(--trace-dim); }

  .card-actions{
    display:flex; gap: 8px; margin-top: 12px; flex-wrap: wrap;
  }
  .mini-btn{
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--line);
    padding: 8px 12px; border-radius: 8px; font-size: 12.5px;
  }
  .mini-btn.copy.copied{ color: var(--trace); border-color: var(--trace-dim); }
  .mini-btn.approve{ color: var(--trace); }
  .mini-btn.posted{ color: var(--gray); }
  .mini-btn.delete{ color: var(--danger); margin-left: auto; }

  .empty{
    text-align: center; padding: 60px 20px; color: var(--text-dim);
  }
  .empty .glyph{ font-size: 28px; margin-bottom: 10px; opacity: 0.7; }
  .empty p{ font-size: 13px; max-width: 320px; margin: 6px auto 0; }

  .spinner{
    width: 14px; height: 14px; border-radius: 50%;
    border: 2px solid rgba(5,19,10,0.3); border-top-color: #05130a;
    animation: spin 0.7s linear infinite;
  }
  .spinner.spinner-dark{
    border: 2px solid rgba(232,237,233,0.25); border-top-color: var(--text);
  }
  @keyframes spin{ to{ transform: rotate(360deg); } }

  .prompt-box{
    margin-top: 10px;
    padding: 12px;
    background: var(--panel-2);
    border: 1px dashed var(--trace-dim);
    border-radius: 10px;
  }
  .prompt-output{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12.5px;
    color: var(--text-dim);
    background: transparent;
    border: 1px solid var(--line);
    margin: 6px 0 10px;
  }
  .mini-btn.copy-prompt.copied{ color: var(--trace); border-color: var(--trace-dim); }

  .sources-panel{
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 16px 18px;
    margin-bottom: 18px;
  }
  .sources-head{
    display:flex; align-items:center; justify-content: space-between;
    cursor: pointer;
  }
  .sources-title{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11.5px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text-dim);
  }
  .sources-count{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; color: var(--trace);
  }
  .chevron{ color: var(--text-dim); font-size: 12px; transition: transform 0.15s ease; }
  .sources-panel.collapsed .chevron{ transform: rotate(-90deg); }
  .sources-body{ margin-top: 14px; }
  .sources-panel.collapsed .sources-body{ display: none; }
  .source-list{ display:flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
  .source-chip{
    display:flex; align-items:center; gap: 7px;
    background: var(--panel-2); border: 1px solid var(--line);
    border-radius: 20px; padding: 6px 6px 6px 12px;
    font-size: 12.5px; color: var(--text);
  }
  .source-chip button{
    background: transparent; color: var(--text-dim);
    border: none; width: 18px; height: 18px; border-radius: 50%;
    display:flex; align-items:center; justify-content:center;
    font-size: 13px; line-height: 1; padding: 0;
  }
  .source-chip button:hover{ color: var(--danger); }
  .source-add{ display:flex; gap: 8px; }
  .source-add input{
    flex: 1;
    background: var(--panel-2); border: 1px solid var(--line);
    border-radius: 8px; color: var(--text);
    font-family: 'Sora', sans-serif; font-size: 13.5px;
    padding: 10px 12px;
  }
  .source-add input:focus{ outline: none; border-color: var(--trace-dim); }
  .source-add button{
    background: var(--trace-dim); color: #eafff2;
    padding: 10px 14px; border-radius: 8px; font-size: 13px;
  }
  .source-hint{ font-size: 11.5px; color: var(--text-dim); margin: 10px 0 0; }
  .handle-bar{ display:flex; align-items:center; gap:10px; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 16px; margin-bottom:12px; flex-wrap:wrap; }
  .handle-bar label{ font-size:13px; color:var(--text-dim); white-space:nowrap; }
  .handle-input-wrap{ display:flex; align-items:center; background:var(--bg); border:1px solid var(--border); border-radius:7px; padding:0 10px; gap:2px; }
  .handle-at{ font-family:'IBM Plex Mono',monospace; font-size:14px; color:var(--trace); }
  .handle-input-wrap input{ background:transparent; border:none; outline:none; font-family:'IBM Plex Mono',monospace; font-size:14px; color:var(--text); width:160px; padding:7px 2px; }
  .btn-save-handle{ background:var(--trace); color:#0a0f0d; border:none; border-radius:7px; padding:7px 16px; font-size:13px; font-weight:700; cursor:pointer; }
  .btn-save-handle:hover{ opacity:0.85; }
  .handle-saved{ font-size:12px; color:var(--trace); opacity:0; transition:opacity 0.3s; }
  .handle-saved.show{ opacity:1; }
  .history-session{ margin-bottom:28px; }
  .history-session-head{ font-size:12px; color:var(--text-dim); font-family:"IBM Plex Mono",monospace; padding:6px 0; border-bottom:1px solid var(--border); margin-bottom:14px; display:flex; justify-content:space-between; align-items:center; }
  .history-clear-btn{ font-size:11px; color:var(--danger); background:none; border:none; cursor:pointer; padding:2px 6px; }
  .history-empty{ text-align:center; color:var(--text-dim); padding:60px 20px; font-size:14px; }

  .graphic-block{
    margin-top: 14px;
    border-top: 1px dashed var(--line);
    padding-top: 14px;
  }
  .graphic-label{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 10px; display:block;
  }
  .graphic-canvas-wrap{
    width: 100%; max-width: 320px;
    border-radius: 10px; overflow: hidden;
    border: 1px solid var(--line);
    background: var(--panel-2);
    margin-bottom: 10px;
  }
  .graphic-canvas-wrap canvas{ width: 100%; height: auto; display: block; }
  .graphic-empty{
    aspect-ratio: 4/5; display:flex; align-items:center; justify-content:center;
    color: var(--text-dim); font-size: 12px; text-align:center; padding: 20px;
  }
  .graphic-controls{ display:flex; gap: 8px; flex-wrap: wrap; }
  .file-btn{
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--line); padding: 8px 12px;
    border-radius: 8px; font-size: 12.5px; cursor: pointer;
    display: inline-block;
  }
  .file-btn input{ display: none; }
  .mini-btn.download{ color: var(--copper); }

  @media (max-width: 480px){
    h1{ font-size: 22px; }
    .card{ padding: 14px; }
    .tabs{ margin-left: 0; }
    .controls{ flex-direction: column; align-items: stretch; }
    .tabs{ display:grid; grid-template-columns: repeat(4,1fr); }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="eyebrow">Draft queue · not auto-posted</div>
    <h1>Tammy Padal — Tech News Drafts</h1>
    <p class="sub">Pulls fresh PC hardware/component news and writes ready-to-edit Facebook captions. You review, edit, and post manually.</p>
  </div>
</header>

<main>
  <div class="handle-bar">
    <label for="handleInput">🏷️ Page handle:</label>
    <div class="handle-input-wrap">
      <span class="handle-at">@</span>
      <input type="text" id="handleInput" placeholder="tammypadal" maxlength="40" spellcheck="false">
    </div>
    <button class="btn-save-handle" id="saveHandleBtn">Save</button>
    <span class="handle-saved" id="handleSaved">✓ Saved</span>
  </div>

  <div class="sources-panel" id="sourcesPanel">
    <div class="sources-head" id="sourcesHead">
      <span class="sources-title">Trusted sources <span class="sources-count" id="sourcesCount"></span></span>
      <span class="chevron">▾</span>
    </div>
    <div class="sources-body">
      <div class="source-list" id="sourceList"></div>
      <div class="source-add">
        <input type="text" id="sourceInput" placeholder="Add a site (e.g. yugatech.com or Rock Paper Shotgun)">
        <button id="sourceAddBtn">Add</button>
      </div>
      <p class="source-hint">Drafts will only pull from sites in this list. Remove all to search broadly again.</p>
    </div>
  </div>

  <div class="controls">
    <button class="btn-primary" id="genBtn">
      <span id="genLabel">⚡ Generate drafts</span>
    </button>
    <div class="tabs" id="tabs">
      <button class="btn-ghost active" data-filter="all">All</button>
      <button class="btn-ghost" data-filter="draft">Draft</button>
      <button class="btn-ghost" data-filter="approved">Approved</button>
      <button class="btn-ghost" data-filter="posted">Posted</button>
      <button class="btn-ghost" data-filter="history">🕒 History</button>
    </div>
  </div>
  <div class="status-line" id="statusLine"></div>
  <div id="feed"></div>
</main>

<script>
let PAGE_NAME = "tpknows";

// Load saved handle
(async () => {
  try {
    const res = localStorage.getItem('page_handle');
    if(res) PAGE_NAME = res;
  } catch(e) {}
  const inp = document.getElementById('handleInput');
  if(inp) inp.value = PAGE_NAME;
})();

document.getElementById('saveHandleBtn').addEventListener('click', async () => {
  const val = document.getElementById('handleInput').value.trim().replace(/^@+/, '');
  if(!val) return;
  PAGE_NAME = val;
  try { localStorage.setItem('page_handle', val); } catch(e) {}
  const saved = document.getElementById('handleSaved');
  saved.classList.add('show');
  setTimeout(() => saved.classList.remove('show'), 2000);
});
let drafts = [];
let currentFilter = 'all';
let sources = [];
let history_sessions = []; // [{date, label, drafts:[]}]

const DEFAULT_SOURCES = [
  "Tom's Hardware", "Videocardz", "TechPowerUp", "Wccftech", "Notebookcheck", "YugaTech"
];

const sourceList = document.getElementById('sourceList');
const sourceInput = document.getElementById('sourceInput');
const sourceAddBtn = document.getElementById('sourceAddBtn');
const sourcesCount = document.getElementById('sourcesCount');
const sourcesHead = document.getElementById('sourcesHead');
const sourcesPanel = document.getElementById('sourcesPanel');


const feed = document.getElementById('feed');
const genBtn = document.getElementById('genBtn');
const genLabel = document.getElementById('genLabel');
const statusLine = document.getElementById('statusLine');
const tabs = document.getElementById('tabs');

function setStatus(msg, isError=false){
  statusLine.textContent = msg || '';
  statusLine.classList.toggle('error', !!isError);
}

async function loadDrafts(){
  try{
    const res = localStorage.getItem('drafts');
    drafts = res ? JSON.parse(res) : [];
  }catch(e){ drafts = []; }
  render();
}

async function loadSources(){
  try{
    const res = localStorage.getItem('sources');
    sources = res ? JSON.parse(res) : [...DEFAULT_SOURCES];
  }catch(e){
    sources = [...DEFAULT_SOURCES];
  }
  renderSources();
}

async function saveSources(){
  try{
    localStorage.setItem('sources', JSON.stringify(sources));
  }catch(e){
    setStatus('Could not save sources list.', true);
  }
}

function renderSources(){
  sourcesCount.textContent = `(${sources.length})`;
  if(sources.length === 0){
    sourceList.innerHTML = `<span style="color:var(--text-dim);font-size:12.5px;">No sources set — searches broadly.</span>`;
    return;
  }
  sourceList.innerHTML = sources.map((s, i) => `
    <span class="source-chip">${escapeHtml(s)}<button data-idx="${i}" title="Remove">&times;</button></span>
  `).join('');
}

sourceList.addEventListener('click', async (e) => {
  const btn = e.target.closest('button[data-idx]');
  if(!btn) return;
  const idx = parseInt(btn.dataset.idx, 10);
  sources.splice(idx, 1);
  await saveSources();
  renderSources();
});

function addSource(){
  const val = sourceInput.value.trim();
  if(!val) return;
  if(sources.some(s => s.toLowerCase() === val.toLowerCase())){
    sourceInput.value = '';
    return;
  }
  sources.push(val);
  sourceInput.value = '';
  saveSources();
  renderSources();
}
sourceAddBtn.addEventListener('click', addSource);
sourceInput.addEventListener('keydown', (e) => { if(e.key === 'Enter'){ e.preventDefault(); addSource(); } });

sourcesHead.addEventListener('click', () => sourcesPanel.classList.toggle('collapsed'));


async function saveDrafts(){
  try{
    localStorage.setItem('drafts', JSON.stringify(drafts));
  }catch(e){
    setStatus('Could not save — your last change may not persist.', true);
  }
}

async function loadHistory(){
  try{
    const res = localStorage.getItem('history_sessions');
    history_sessions = res ? JSON.parse(res) : [];
  }catch(e){ history_sessions = []; }
}

async function saveHistory(){
  try{
    // Keep last 50 sessions max
    if(history_sessions.length > 50) history_sessions = history_sessions.slice(0, 50);
    localStorage.setItem('history_sessions', JSON.stringify(history_sessions));
  }catch(e){ console.warn('History save failed', e); }
}

async function addToHistory(newDrafts){
  await loadHistory();
  const now = new Date();
  const label = now.toLocaleDateString('en-PH', { month:'short', day:'numeric', year:'numeric' })
    + ' · ' + now.toLocaleTimeString('en-PH', { hour:'2-digit', minute:'2-digit' });
  // Store only lightweight data (no imageData blobs — too heavy)
  const lightDrafts = newDrafts.map(d => ({
    id: d.id,
    headline: d.headline,
    source: d.source,
    url: d.url,
    category: d.category,
    caption: d.caption,
    imageUrl: d.imageUrl,
    status: d.status,
    createdAt: d.createdAt,
  }));
  const session = { sessionId: `s_${now.getTime()}`, date: now.toISOString(), label, drafts: lightDrafts };
  history_sessions.unshift(session);
  await saveHistory();
}

function renderHistory(){
  const feed = document.getElementById('feed');
  if(!history_sessions.length){
    feed.innerHTML = `<div class="history-empty">📭 Wala pang history.<br>Mag-generate ng drafts para ma-save dito.</div>`;
    return;
  }
  feed.innerHTML = history_sessions.map((session, si) => `
    <div class="history-session">
      <div class="history-session-head">
        <span>📅 ${escapeHtml(session.label)} · ${session.drafts.length} draft${session.drafts.length !== 1 ? 's' : ''}</span>
        <button class="history-clear-btn" data-session="${si}">Remove</button>
      </div>
      ${session.drafts.map(d => `
        <div class="card" style="margin-bottom:10px;">
          <div class="card-meta">
            <span class="badge badge-${(d.category||'General').toLowerCase()}">${escapeHtml(d.category||'General')}</span>
            <span class="source-line">${escapeHtml(d.source||'')}${d.url ? ` · <a href="${escapeHtml(d.url)}" target="_blank">Article ↗</a>` : ''}</span>
          </div>
          <div class="card-headline">${escapeHtml(d.headline)}</div>
          <div class="card-caption" style="font-size:13px;color:var(--text-dim);margin-top:6px;white-space:pre-wrap;">${escapeHtml(d.caption)}</div>
        </div>
      `).join('')}
    </div>
  `).join('');

  // Remove session handler
  feed.querySelectorAll('.history-clear-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const si = parseInt(btn.dataset.session);
      history_sessions.splice(si, 1);
      await saveHistory();
      renderHistory();
    });
  });
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

function render(){
  const list = currentFilter === 'all' ? drafts : drafts.filter(d => d.status === currentFilter);

  if(list.length === 0){
    feed.innerHTML = `
      <div class="empty">
        <div class="glyph">◇</div>
        <p>${drafts.length === 0
          ? 'No drafts yet. Tap "Generate drafts" to pull today\u2019s PC hardware news.'
          : 'Nothing in this filter yet.'}</p>
      </div>`;
    return;
  }

  feed.innerHTML = list.map(d => `
    <div class="card" data-status="${d.status}" data-id="${d.id}">
      <div class="pin"></div>
      <div class="card-body">
        <div class="card-top">
          <div class="tag-row">
            <span class="cat">${escapeHtml(d.category || 'Tech')}</span>
            <span class="status-pill">${d.status}</span>
          </div>
        </div>
        <h3 class="headline">${escapeHtml(d.headline)}</h3>
        <p class="source-line">${escapeHtml(d.source || '')}${d.url ? ` · <a href="${escapeHtml(d.url)}" target="_blank" rel="noopener">source ↗</a>` : ''}</p>
        <span class="graphic-label" style="margin-top:10px;">Caption for graphic (text on image)</span>
        <textarea data-id="${d.id}" class="graphic-caption-input" style="margin-bottom:12px;">${escapeHtml(d.graphicCaption != null ? d.graphicCaption : d.caption)}</textarea>
        <span class="graphic-label">Caption for Facebook post/feed</span>
        <textarea data-id="${d.id}" class="caption-input">${escapeHtml(d.caption)}</textarea>
        <div class="graphic-block">
          <span class="graphic-label">Post graphic</span>
          <div class="graphic-canvas-wrap" id="canvasWrap-${d.id}">
            <canvas id="canvas-${d.id}" width="1080" height="1080"></canvas>
          </div>
          <div class="graphic-controls">
            <label class="file-btn">📷 ${d.imageData ? 'Replace with real photo' : 'Use a real photo instead'}
              <input type="file" accept="image/*" class="photo-input" data-id="${d.id}">
            </label>

// Cloudflare Worker proxy — used both for the Gemini API call and for
// pulling article hero images (bypasses CORS on hotlinked images)
const PROXY_URL = "https://tp-technews-fetcher.tammy-padal.workers.dev";

function fetchImageAsDataUrl(url){
  return new Promise((resolve, reject) => {
    if(!url){ reject(new Error('No image URL')); return; }
    // Route through Worker proxy to bypass CORS restrictions
    const proxied = `${PROXY_URL.replace(/\/$/, '')}/proxy-image?url=${encodeURIComponent(url)}`;
    const img = new Image();
    img.crossOrigin = 'anonymous';
    const timeout = setTimeout(() => reject(new Error('Timed out')), 15000);
    img.onload = () => {
      clearTimeout(timeout);
      try{
        let w = img.width, h = img.height;
        const maxDim = 1080;
        if(w >= h && w > maxDim){ h = Math.round(h * maxDim / w); w = maxDim; }
        else if(h > w && h > maxDim){ w = Math.round(w * maxDim / h); h = maxDim; }
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(c.toDataURL('image/jpeg', 0.85));
      }catch(e){
        reject(e);
      }
    };
    img.onerror = () => { clearTimeout(timeout); reject(new Error('Image failed to load')); };
    img.src = proxied;
  });
}

// Automatically tries to pull the article's hero photo for every new draft,
// one at a time (kinder to the proxy than firing them all in parallel).
// Silent per-draft failures — those cards just fall back to the manual
// "Try fetch from article" / "Upload photo" buttons.
async function autoFetchPhotos(newDrafts){
  const candidates = newDrafts.filter(d => d.imageUrl);
  if(!candidates.length) return;
  let done = 0;
  setStatus(`Auto-fetching photos… (0/${candidates.length})`);
  for(const d of candidates){
    try{
      const dataUrl = await fetchImageAsDataUrl(d.imageUrl);
      // Draft may have been deleted while we were fetching — guard against that
      const live = drafts.find(x => x.id === d.id);
      if(live){
        live.imageData = dataUrl;
        await saveDrafts();
        render();
      }
    }catch(err){
      console.warn('Auto-fetch failed for', d.headline, err);
    }
    done++;
    setStatus(`Auto-fetching photos… (${done}/${candidates.length})`);
  }
  setStatus('');
}

// Asks the AI (via the same Worker proxy used for drafts) to write a
// single, vivid image-generation prompt for this specific story — meant
// to be pasted into ChatGPT's image generator (or DALL·E/similar) so
// every post can get a unique graphic even when no real photo is
// available or wanted. This only returns TEXT — it does not create an
// image itself, and never blocks the existing "upload your own photo"
// or "fetch from article" options.
async function generateImagePrompt(d){
  const systemPrompt = `You are a visual prompt writer for a Filipino PC hardware/tech news page. Given a news headline, category, and caption, write ONE single, vivid, highly-specific prompt for an AI image generator (ChatGPT/DALL·E style) that will produce a unique, on-brand square (1:1) editorial graphic for this story.

Rules for the prompt you write:
- Describe a concrete visual scene (product, setting, lighting, mood, composition) — not abstract concepts.
- Match the category's subject matter (GPU/CPU/motherboard/peripheral/etc.) with plausible, generic hardware — do not name specific real brand logos or trademarked packaging designs.
- Aesthetic: dark, moody tech-editorial look — deep green/black tones, subtle neon or copper accent lighting, high detail, photorealistic or clean 3D render style.
- Explicitly state: no text, no logos, no watermarks, no captions in the image.
- Aspect ratio: square, 1:1.
- Length: 2-4 sentences.

Respond with ONLY the prompt text itself — no preamble, no quotes, no markdown, no labels like "Prompt:".`;

  const userPrompt = `Headline: ${d.headline}\nCategory: ${d.category || 'General'}\nCaption: ${d.graphicCaption != null ? d.graphicCaption : d.caption}`;

  const response = await fetch(PROXY_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ systemPrompt, prompt: userPrompt })
  });

  if(!response.ok){
    let detail = '';
    try{ detail = (await response.json()).error || ''; }catch(e){}
    throw new Error(`API error ${response.status}${detail ? ': ' + detail : ''}`);
  }

  const data = await response.json();
  if(data.error) throw new Error(data.error);

  const text = (data.text || '').trim();
  if(!text) throw new Error('No response from AI — please try again.');
  return text;
}

function compressImage(file, maxDim, quality){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if(w >= h && w > maxDim){ h = Math.round(h * maxDim / w); w = maxDim; }
        else if(h > w && h > maxDim){ w = Math.round(w * maxDim / h); h = maxDim; }
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(c.toDataURL('image/jpeg', quality));
      };
      img.onerror = () => reject(new Error('Image load failed'));
      img.src = reader.result;
    };
    reader.onerror = () => reject(new Error('File read failed'));
    reader.readAsDataURL(file);
  });
}

function roundRect(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function wrapAndDrawHeadline(ctx, text, highlightWords, x, y, maxWidth, lineHeight){
  const words = (text || '').split(/\s+/).filter(Boolean);
  const highlightSet = new Set((highlightWords || []).map(w => w.toLowerCase()));
  let cx = x, cy = y;
  words.forEach(word => {
    const clean = word.replace(/[^\p{L}\p{N}]/gu, '').toLowerCase();
    const wWidth = ctx.measureText(word + ' ').width;
    if(cx + wWidth > x + maxWidth){
      cx = x; cy += lineHeight;
    }
    ctx.fillStyle = highlightSet.has(clean) ? '#c9885a' : '#f4f7f5';
    ctx.fillText(word, cx, cy);
    cx += wWidth;
  });
}

// Wrap text and return array of lines (for pre-measuring height)
function measureWrappedLines(ctx, text, maxWidth){
  const words = (text || '').split(/\s+/).filter(Boolean);
  const lines = [];
  let line = '';
  words.forEach(word => {
    const test = line ? line + ' ' + word : word;
    if(ctx.measureText(test).width > maxWidth && line){
      lines.push(line);
      line = word;
    } else {
      line = test;
    }
  });
  if(line) lines.push(line);
  return lines;
}

// Draw wrapped text with per-word highlight support
function drawWrappedHighlighted(ctx, text, highlightWords, x, y, maxWidth, lineH, normalColor, highlightColor){
  const highlightSet = new Set((highlightWords || []).map(w => w.toLowerCase()));
  const words = (text || '').split(/\s+/).filter(Boolean);
  let cx = x, cy = y;
  words.forEach(word => {
    const wWidth = ctx.measureText(word + ' ').width;
    if(cx + wWidth - ctx.measureText(' ').width > x + maxWidth && cx !== x){
      cx = x; cy += lineH;
    }
    const clean = word.replace(/[^\p{L}\p{N}]/gu, '').toLowerCase();
    ctx.fillStyle = highlightSet.has(clean) ? highlightColor : normalColor;
    ctx.fillText(word, cx, cy);
    cx += wWidth;
  });
  return cy; // return last y used
}

const CATEGORY_STYLES = {
  GPU: { color: '#4ade80', label: 'GPU' },
  CPU: { color: '#e0b04a', label: 'CPU' },
  Storage: { color: '#5aa9e0', label: 'SSD' },
  Motherboard: { color: '#c9885a', label: 'MOBO' },
  Peripherals: { color: '#8fa89a', label: 'I/O' },
  Cooling: { color: '#4ac9e0', label: 'FAN' },
  PSU: { color: '#e0685a', label: 'PSU' },
  General: { color: '#4ade80', label: 'TECH' }
};
function getCategoryStyle(category){
  return CATEGORY_STYLES[category] || CATEGORY_STYLES.General;
}

// Procedurally generated background used whenever there's no real photo
// (fetch blocked, not uploaded yet) — a category-tinted circuit pattern
// plus a badge, so every draft still gets a distinct, on-brand graphic
// instead of an empty box. 100% drawn with canvas primitives, no external
// images, so there's no copyright concern.
function drawCategoryBackground(ctx, W, imgAreaH, category){
  const style = getCategoryStyle(category);

  const grad = ctx.createLinearGradient(0, 0, 0, imgAreaH);
  grad.addColorStop(0, '#0f1613');
  grad.addColorStop(1, '#0a0f0d');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, imgAreaH);

  // diagonal circuit-style line pattern, tinted with the category color
  ctx.save();
  ctx.beginPath();
  ctx.rect(0, 0, W, imgAreaH);
  ctx.clip();
  ctx.strokeStyle = style.color;
  ctx.globalAlpha = 0.16;
  ctx.lineWidth = 2;
  const step = 64;
  for(let x = -imgAreaH; x < W + imgAreaH; x += step){
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x + imgAreaH, imgAreaH);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
  ctx.restore();

  // center badge: ring + category label
  const cx = W / 2, cy = imgAreaH / 2;
  const r = Math.min(W, imgAreaH) * 0.22;

  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  ctx.fill();
  ctx.lineWidth = 3;
  ctx.strokeStyle = style.color;
  ctx.globalAlpha = 0.7;
  ctx.stroke();
  ctx.globalAlpha = 1;
  ctx.restore();

  ctx.save();
  ctx.font = `800 60px "IBM Plex Mono", monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = style.color;
  ctx.fillText(style.label, cx, cy);
  ctx.restore();
}

function drawGraphic(d){
  return new Promise((resolve) => {
    const canvas = document.getElementById(`canvas-${d.id}`);
    if(!canvas){ resolve(false); return; }
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height; // 1080 x 1080

    Promise.all([
      document.fonts.load('800 52px Sora'),
      document.fonts.load('700 34px Sora'),
      document.fonts.load('400 30px Sora'),
      document.fonts.load('600 26px "IBM Plex Mono"')
    ]).catch(() => {}).then(() => {

      const finishDraw = (photoImg) => {
        ctx.clearRect(0, 0, W, H);

        // ── Layout constants ──────────────────────────────────
        const PAD = 56;
        const HEADLINE_SIZE = 48;
        const CAPTION_SIZE = 30;
        const HANDLE_SIZE = 26;
        const LINE_H_HEAD = 62;
        const LINE_H_CAP = 44;
        const STRIP_GAP = 36;   // gap between photo and strip
        const INNER_PAD_TOP = 40;
        const INNER_PAD_BOT = 44;

        // Pre-measure text heights to size the strip
        ctx.font = `800 ${HEADLINE_SIZE}px Sora, sans-serif`;
        const headLines = measureWrappedLines(ctx, d.headline, W - PAD * 2);
        const headH = headLines.length * LINE_H_HEAD;

        ctx.font = `400 ${CAPTION_SIZE}px Sora, sans-serif`;
        const capLines = measureWrappedLines(ctx, d.graphicCaption != null ? d.graphicCaption : d.caption, W - PAD * 2);
        const capH = capLines.length * LINE_H_CAP;

        ctx.font = `600 ${HANDLE_SIZE}px "IBM Plex Mono", monospace`;
        const handleH = HANDLE_SIZE + 16 + 24; // pill height + gap before headline (now sits at the top of the strip)

        const stripH = INNER_PAD_TOP + handleH + headH + 20 + capH + INNER_PAD_BOT;
        const imgAreaH = H - STRIP_GAP - stripH;

        ctx.fillStyle = '#0a0f0d';
        ctx.fillRect(0, 0, W, H);

        if(photoImg){
          // ── Draw real photo (top, cover-fit) ─────────────────
          const scale = Math.max(W / photoImg.width, imgAreaH / photoImg.height);
          const iw = photoImg.width * scale, ih = photoImg.height * scale;
          const ix = (W - iw) / 2, iy = (imgAreaH - ih) / 2;
          ctx.save();
          ctx.beginPath();
          ctx.rect(0, 0, W, imgAreaH);
          ctx.clip();
          ctx.drawImage(photoImg, ix, iy, iw, ih);
          ctx.restore();
        } else {
          // ── No photo available — auto category background ───
          drawCategoryBackground(ctx, W, imgAreaH, d.category);
        }

        // Soft gradient at bottom blending into strip
        const grad = ctx.createLinearGradient(0, imgAreaH - 80, 0, imgAreaH + STRIP_GAP);
        grad.addColorStop(0, 'rgba(10,15,13,0)');
        grad.addColorStop(1, 'rgba(10,15,13,1)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, imgAreaH - 80, W, 80 + STRIP_GAP);

        // ── Dark strip below photo ─────────────────────────────
        const stripY = imgAreaH + STRIP_GAP;
        ctx.fillStyle = '#0a0f0d';
        ctx.fillRect(0, stripY, W, H - stripY);

        // thin green accent line at top of strip
        ctx.fillStyle = '#4ade80';
        ctx.fillRect(PAD, stripY, W - PAD * 2, 3);

        // ── @handle pill (centered, right under the accent line) ──
        ctx.font = `600 ${HANDLE_SIZE}px "IBM Plex Mono", monospace`;
        ctx.textAlign = 'left';
        ctx.textBaseline = 'alphabetic';
        const handle = PAGE_NAME ? `@${PAGE_NAME.toLowerCase().replace(/\s+/g,'')}` : '@tpknows';
        const pW = ctx.measureText(handle).width + 32;
        const pH = HANDLE_SIZE + 16;
        const pillX = (W - pW) / 2;
        const pillTopY = stripY + INNER_PAD_TOP;
        const pillTextY = pillTopY + pH / 2 + HANDLE_SIZE * 0.35;
        roundRect(ctx, pillX, pillTopY, pW, pH, pH / 2);
        ctx.fillStyle = '#1e2b25';
        ctx.fill();
        ctx.fillStyle = '#4ade80';
        ctx.fillText(handle, pillX + 16, pillTextY);

        // ── Headline (with highlighted keywords in amber) ──────
        let ty = pillTopY + pH + 24 + HEADLINE_SIZE;
        ctx.font = `800 ${HEADLINE_SIZE}px Sora, sans-serif`;
        ctx.textAlign = 'left';
        ctx.textBaseline = 'alphabetic';
        drawWrappedHighlighted(ctx, d.headline, d.highlight_words, PAD, ty, W - PAD * 2, LINE_H_HEAD, '#f4f7f5', '#e0b04a');
        ty += headH + 20;

        // ── Caption text (highlighted keywords in green) ───────
        ctx.font = `400 ${CAPTION_SIZE}px Sora, sans-serif`;
        drawWrappedHighlighted(ctx, d.graphicCaption != null ? d.graphicCaption : d.caption, d.highlight_words, PAD, ty, W - PAD * 2, LINE_H_CAP, '#b8c9be', '#4ade80');

        resolve(true);
      };

      if(d.imageData){
        const img = new Image();
        img.onload = () => finishDraw(img);
        img.onerror = () => { setStatus('Could not render that photo — using category background instead.', true); finishDraw(null); };
        img.src = d.imageData;
      } else {
        finishDraw(null);
      }
    });
  });
}

"caption_graphic" — the short version that gets overlaid on the image itself:

Examples of the tone to aim for:

- "Paying ₱8,000 more for 4% more performance is technically a choice. So is lighting your money on fire."

Respond with ONLY a raw JSON array (no markdown fences, no commentary) where each item has exactly these fields:
[{"headline": "...", "source": "publication name", "url": "article url", "image_url": "direct URL to the article's main/hero image if you can identify one, otherwise empty string", "category": "GPU|CPU|Storage|Motherboard|Peripherals|Cooling|PSU|General", "caption_graphic": "the short caption for the image graphic", "caption_feed": "the longer, more detailed caption for the Facebook feed post", "highlight_words": ["1-3 key words or short product names from the headline to visually emphasize, e.g. product names, brand names, or standout numbers"]}]`;

  try{
    setStatus('Searching recent hardware news…');

    const response = await fetch(PROXY_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        systemPrompt,
        prompt: "Find today's PC hardware/component news and write the Facebook caption drafts as specified. Today's date is " + new Date().toDateString() + "."
      })
    });

    if(!response.ok){
      let detail = '';
      try{ detail = (await response.json()).error || ''; }catch(e){}
      throw new Error(`API error ${response.status}${detail ? ': ' + detail : ''}`);
    }

    const data = await response.json();
    if(data.error) throw new Error(data.error);

    const text = data.text || '';
    if(!text.trim()){
      throw new Error('No response from AI — please try again.');
    }

    const cleaned = text.replace(/```json|```/g, '').trim();
    const jsonMatch = cleaned.match(/\[[\s\S]*\]/);
    if(!jsonMatch) throw new Error('Response did not contain valid JSON — it may have been cut off.');

    let items;
    try{
      items = JSON.parse(jsonMatch[0]);
    }catch(parseErr){
      throw new Error('Could not parse the response JSON (likely truncated). Try again.');
    }
    if(!Array.isArray(items) || items.length === 0) throw new Error('No news items came back — try again or widen your sources list.');

    const now = Date.now();
    const newDrafts = items.map((it, i) => {
      const graphicCap = it.caption_graphic || it.caption || '';
      const feedCap = it.caption_feed || it.caption || graphicCap;
      const url = it.url || '';
      // Keep the graphic's on-image text short (no raw URL clutter) —
      // the longer feed caption gets a "Read more" line with the source
      // link appended, since that's the one actually posted to Facebook.
      const captionWithSource = url ? `${feedCap}\n\nRead more: ${url}` : feedCap;
      return {
        id: `d_${now}_${i}`,
        headline: it.headline || 'Untitled',
        source: it.source || '',
        url,
        category: it.category || 'General',
        caption: captionWithSource,
        graphicCaption: graphicCap,
        highlight_words: Array.isArray(it.highlight_words) ? it.highlight_words : [],
        imageUrl: it.image_url || '',
        imageData: null,
        imagePrompt: null,
        promptCopied: false,
        status: 'draft',
        createdAt: now
      };
    });

    drafts = [...newDrafts, ...drafts];
    await saveDrafts();
    await addToHistory(newDrafts); // auto-save every generation to history
    currentFilter = 'all';
    [...tabs.children].forEach(b => b.classList.toggle('active', b.dataset.filter === 'all'));
    render();
    autoFetchPhotos(newDrafts); // background, non-blocking — fills in imageData as each resolves
    setStatus(`Added ${newDrafts.length} new draft${newDrafts.length === 1 ? '' : 's'}.`);

  }catch(err){
    console.error(err);
    setStatus(`Could not generate drafts: ${err.message || 'unknown error'}`, true);
  }finally{
    genBtn.disabled = false;
    genLabel.textContent = '⚡ Generate drafts';
  }
}

genBtn.addEventListener('click', generateDrafts);

loadDrafts();
loadSources();
</script>
